<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <title th:text="#{todo.form.title}">Todo Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-end gap-2 mb-3">
        <a class="btn btn-outline-secondary btn-sm" href="?lang=vi">Tiếng Việt</a>
        <a class="btn btn-outline-secondary btn-sm" href="?lang=en">English</a>
    </div>

    <h2 class="text-center mb-4"
        th:text="${todo.id} != null ? #{todo.form.editTitle} : #{todo.form.addTitle}">Add todo</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/form}" method="post" th:object="${todo}">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="content" th:text="#{todo.field.content}">Content</label>
                    <input id="content" type="text" class="form-control" th:field="*{content}">
                    <small class="text-danger" th:errors="*{content}"></small>
                </div>

                <div class="mb-3">
                    <label for="dueDate" th:text="#{todo.field.dueDate}">Due date</label>
                    <input id="dueDate" type="date" class="form-control" th:field="*{dueDate}">
                    <small class="text-danger" th:errors="*{dueDate}"></small>
                </div>

                <div class="mb-3">
                    <label for="status" th:text="#{todo.field.status}">Status</label>
                    <select id="status" class="form-control" th:field="*{status}">
                        <option value="PENDING" th:text="#{todo.status.pending}">PENDING</option>
                        <option value="DONE" th:text="#{todo.status.done}">DONE</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="priority" th:text="#{todo.field.priority}">Priority</label>
                    <select id="priority" class="form-control" th:field="*{priority}">
                        <option value="LOW" th:text="#{todo.priority.low}">LOW</option>
                        <option value="MEDIUM" th:text="#{todo.priority.medium}">MEDIUM</option>
                        <option value="HIGH" th:text="#{todo.priority.high}">HIGH</option>
                    </select>
                </div>

                <div class="d-flex">
                    <button class="btn btn-primary"
                            th:text="${todo.id} != null ? #{button.update} : #{button.save}">Save</button>
                    <a class="btn btn-secondary ms-2" th:href="@{/todos}" th:text="#{button.backToList}">Back to list</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
