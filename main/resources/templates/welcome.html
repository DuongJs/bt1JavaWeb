<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <title th:text="#{welcome.title}">Welcome</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5" style="max-width: 520px;">
    <div class="d-flex justify-content-end gap-2 mb-3">
        <a class="btn btn-outline-secondary btn-sm" href="?lang=vi">Tiếng Việt</a>
        <a class="btn btn-outline-secondary btn-sm" href="?lang=en">English</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="mb-4" th:text="#{welcome.heading}">Welcome</h2>

            <div class="alert alert-danger" th:if="${messageKey}" th:text="#{${messageKey}}"></div>

            <form th:action="@{/welcome}" method="post">
                <div class="mb-3">
                    <label for="ownerName" class="form-label" th:text="#{owner.name}">Owner name</label>
                    <input id="ownerName" name="ownerName" type="text" class="form-control"
                           th:placeholder="#{owner.name.placeholder}">
                </div>

                <button class="btn btn-primary w-100" type="submit" th:text="#{button.continue}">Continue</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
